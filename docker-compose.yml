services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ferrum
      POSTGRES_PASSWORD: ferrum
      POSTGRES_DB: ferrum
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferrum"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  ferrum:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./examples/schema/ecommerce:/schema:ro
    environment:
      DATABASE_URL: postgres://ferrum:ferrum@postgres:5432/ferrum
      # Override before `docker compose up` for non-demo use:
      #   export FERRUM_JWT_SECRET=$(openssl rand -hex 32)
      FERRUM_JWT_SECRET: ${FERRUM_JWT_SECRET:-demo-secret-please-rotate-min-32-chars-aaa}
      FERRUM_SCHEMA_DIR: /schema
      FERRUM_SCHEMA_SYNC: full
      # First boot: create the initial admin via POST /auth/setup (see README).
    ports:
      - "8080:8080"

volumes:
  pgdata:
