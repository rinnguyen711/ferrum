name: docker-publish

# Manual only for now. Add `push:` / `tags:` triggers later to auto-publish.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. edge, 0.2.0, latest)"
        type: string
        default: edge
        required: true
      multiarch:
        description: "Also build linux/arm64 (slower, via QEMU)"
        type: boolean
        default: false

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute platforms
        id: plat
        run: |
          if [ "${{ inputs.multiarch }}" = "true" ]; then
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ steps.plat.outputs.platforms }}
          tags: ghcr.io/${{ github.repository_owner }}/ferrum:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            OCI_SOURCE=https://github.com/${{ github.repository }}
            OCI_REVISION=${{ github.sha }}
            OCI_VERSION=${{ inputs.tag }}
