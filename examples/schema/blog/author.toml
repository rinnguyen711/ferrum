# Blog preset — Author. Synced via FERRUM_SCHEMA_DIR=examples/schema/blog
[[content_type]]
name = "author"
display_name = "Author"
kind = "collection"

  [[content_type.field]]
  name = "name"
  kind = "string"
  required = true

  [[content_type.field]]
  name = "slug"
  kind = "slug"
  required = true
  unique = true

  [[content_type.field]]
  name = "email"
  kind = "email"

  [[content_type.field]]
  name = "bio"
  kind = "text"

  [[content_type.field]]
  name = "avatar"
  kind = "media"
  kind_meta = { multiple = false }
